<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#00492b",
                        "on-surface": "#ffffff",
                        "primary-dim": "#63ef82",

                        "on-error-container": "#ffd2c8",

                        "primary-container": "#1cb853",
                        "surface": "#0e0e0e",
                        "secondary-fixed-dim": "#6deca8",
                        "on-primary-container": "#002a0c",
                        "secondary": "#7cfbb5",
                        "primary": "#72fe8f",
                        "surface-variant": "#262626",
                        "inverse-surface": "#fcf9f8",

                        "secondary-container": "#006d42",

                        "outline-variant": "#484847",

                        "surface-container-high": "#20201f",
                        "on-surface-variant": "#adaaaa",
                        "primary-fixed-dim": "#63ef82",
                        "primary-fixed": "#72fe8f",

                    "borderRadius": {

                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-dynamic-gradient {
            background: radial-gradient(circle at top center, rgba(114, 254, 143, 0.15) 0%, rgba(14, 14, 14, 1) 70%);
        }
        .album-art-shadow {
            box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Immersive Now Playing Container -->
<main class="relative min-h-screen flex flex-col bg-dynamic-gradient overflow-hidden">
<!-- Top Bar (Minimal/Collapse) -->
<header class="flex justify-between items-center px-6 py-6 z-10">
<button class="p-2 -ml-2 text-on-surface hover:bg-surface-container-high rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined text-3xl">keyboard_arrow_down</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Playing From Playlist</span>
<span class="text-xs font-semibold text-on-surface">Midnight Highs</span>
</div>
<button class="p-2 -mr-2 text-on-surface hover:bg-surface-container-high rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl">more_vert</span>
</button>
</header>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center justify-center px-8 pb-12 max-w-lg mx-auto w-full">
<!-- Album Art Section -->
<div class="relative w-full aspect-square mb-12 group">
<img alt="Album Art" class="w-full h-full object-cover rounded-xl album-art-shadow transition-transform duration-700 group-hover:scale-[1.02]" data-alt="Abstract vibrant album cover art with neon green and dark emerald swirls, high contrast cinematic lighting, moody and energetic digital painting style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDF1Bma7gsmyrMK6EAd5hSJYhyZVO0Q2kCv3d_F7a2TVOTBrIYZSo9waaCs_mrxLwveGPCqOcf1YlNRBq-Q_PcB8BCSW-Bb83pMZbGsfl9WlFZgIbVG8MJRrmtWf1gR22eZjAVDyWkn2AReUjIX3aiGIBGN6vKXby0pEDX-AGL9n192j2nxo9Ky_tljCbKNjLSUx81QZnQpYHYAxGR39ctZRsX9ZW65U1SuW8I__BsTG6ddxc4WZIECISFkYAN32FOisECyrbqJ_bcT"/>
</div>
<!-- Metadata Section -->
<div class="w-full flex justify-between items-end mb-10">
<div class="flex-1 mr-4 overflow-hidden">
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-white mb-1 truncate leading-none">Neon Nocturne</h1>
<p class="font-body text-lg text-primary font-medium tracking-wide">Solar Drift</p>
</div>
<button class="p-3 bg-surface-container-high rounded-full text-primary hover:bg-surface-container-highest transition-all hover:scale-110 active:scale-90">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</button>
</div>
<!-- Progress Bar Section -->
<div class="w-full mb-10">
<div class="relative h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden cursor-pointer group">
<div class="absolute h-full bg-primary w-[42%] transition-all"></div>
<div class="absolute h-full w-full opacity-0 group-hover:opacity-100 bg-white/10 transition-opacity"></div>
</div>
<div class="flex justify-between mt-3">
<span class="text-[11px] font-medium text-on-surface-variant font-label">1:48</span>
<span class="text-[11px] font-medium text-on-surface-variant font-label">3:24</span>
</div>
</div>
<!-- Playback Controls Section -->
<div class="w-full flex flex-col gap-10">
<!-- Secondary Controls Row -->
<div class="flex items-center justify-between px-2">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">shuffle</span>
</button>
<!-- Core Playback Group -->
<div class="flex items-center gap-8">
<button class="text-on-surface hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">skip_previous</span>
</button>
<!-- Main Play Button -->
<button class="w-20 h-20 flex items-center justify-center bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-full shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-5xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-on-surface hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">skip_next</span>
</button>
</div>
<button class="text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">repeat</span>
</button>
</div>
<!-- Auxiliary Controls -->
<div class="flex items-center justify-between px-6 pt-2">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-xl">devices</span>
</button>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-xl">share</span>
</button>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-xl">playlist_play</span>
</button>
</div>
</div>
</div>
<!-- Lyrics/Queue Peek (Aesthetic Element) -->
<div class="w-full mt-auto flex flex-col items-center pb-8 opacity-40">
<div class="w-8 h-1 bg-on-surface-variant rounded-full mb-3"></div>
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant">Lyrics</span>
</div>
</main>
<!-- Background Glassmorphism Player Detail (Hidden Bottom Navigation suppressed as per instructions) -->
</body></html>
